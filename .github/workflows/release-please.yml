# Maintains a rolling release PR from conventional commits; merging it tags
# vX.Y.Z, publishes a GitHub Release, and bumps pyproject.toml +
# frontend/package.json + CHANGELOG.md (config in release-please-config.json).
# Note: the release PR is opened by GITHUB_TOKEN, so ci.yml does not run on it
# (GitHub anti-recursion rule) — CI still runs on the merge to main.
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
