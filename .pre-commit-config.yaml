# Run with `pre-commit run --all-files` to check everything, or automatically
# on every `git commit` once `pre-commit install` has wired up the hook.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        # Allow the vendored flavor wheel reference data (~130 KB is fine;
        # this excludes it from the size check so future vendored reference
        # files under data/raw can be committed deliberately).
        exclude: ^data/raw/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
